<h2>🏢 1 · Project & Company Overview</h2>

**Walton Group** operates across multiple industries through several business organizations:

| Organization | Business Domain | Products |
|---|---|---|
| Walton Hi-Tech Industries | Consumer Electronics | Refrigerator, TV, AC, Freezer, Washing Machine |
| Walton Digi-Tech Industries | Technology Products | Laptop, Desktop, Mobile, Tablet, Monitor |
| Walton Micro-Tech | Electronics & Components | Batteries, Electrical Devices, Components |
| Walton Plaza | Retail & Distribution | Nationwide POS and retail operations |

Each business unit previously ran its own isolated POS system — creating maintenance overhead, operational complexity, and no unified data layer.

**UniPOS replaces all of them.** Centralized, microservice-based enterprise POS platform supporting multiple business organizations under one scalable architecture.

> This platform is intended strictly for internal enterprise operations and does not have any public production URL.

