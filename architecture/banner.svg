<h2>👤 5 · My Role & Contributions</h2>

**Position:** Software Engineering Intern → Backend Developer, Walton Group

Started as the **only backend developer** from the early stage. A second backend engineer joined after ~30% of the project was completed.

- ✅ Designed and implemented **REST APIs** for product, inventory, sales, merchant, and transaction modules
- ✅ Built **asynchronous event-driven communication** using Apache Kafka
- ✅ Implemented **synchronous inter-service calls** using Spring WebClient and Netflix DGS / GraphQL
- ✅ Developed **merchant-specific business logic** for multi-organization workflow support
- ✅ Implemented CRUD, validation, exception handling, DTO mapping, and layered architecture
- ✅ Performed **technical R&D** before each major feature — researched, validated, then implemented

